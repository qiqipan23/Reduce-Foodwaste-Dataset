name: Docs CI (no style)

on:
  push:
  pull_request:

jobs:
  verify-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local links & assets in docs/
        shell: bash
        run: |
          python3 - <<'PY'
          import re, sys
          from pathlib import Path

          DOCS = Path("docs")
          if not DOCS.exists():
              print("❌ docs/ folder not found")
              sys.exit(1)

          html_files = list(DOCS.rglob("*.html"))
          if not html_files:
              print("⚠️ No HTML files found under docs/ (skipping)")
              sys.exit(0)

          # Extract href/src
          attr_re = re.compile(r'''(?:href|src)\s*=\s*["']([^"']+)["']''', re.IGNORECASE)

          def is_external(u: str) -> bool:
              return (
                  u.startswith(("http://", "https://", "mailto:", "tel:", "data:", "//"))
              )

          missing = []

          for f in html_files:
              text = f.read_text(encoding="utf-8", errors="ignore")
              for u in attr_re.findall(text):
                  u = u.strip()
                  if not u or is_external(u) or u.startswith("#"):
                      continue

                  # strip query/hash
                  u0 = u.split("#", 1)[0].split("?", 1)[0]
                  if not u0:
                      continue

                  # handle absolute paths like "/Reduce-Foodwaste-Dataset/assets/x.png"
                  if u0.startswith("/"):
                      u0 = u0.lstrip("/")
                      # If it starts with repo name, drop it: "<repo>/<path>"
                      parts = u0.split("/", 1)
                      if len(parts) == 2 and parts[0] == "Reduce-Foodwaste-Dataset":
                          u0 = parts[1]
                      target = DOCS / u0
                  else:
                      target = f.parent / u0

                  if not target.exists():
                      missing.append((str(f), u))

          if missing:
              print("❌ Missing local links/assets found:")
              for file, ref in missing:
                  print(f" - In {file}: {ref}")
              sys.exit(1)

          print(f"✅ OK: checked {len(html_files)} HTML files, all local links/assets exist.")
          PY